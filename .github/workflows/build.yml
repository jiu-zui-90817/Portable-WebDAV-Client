name: Build and Release EXE

# 触发条件：当推送带有 v 开头的标签（如 v1.0.0）时，自动触发打包
on:
  push:
    tags:
      - 'v*'
  # 同时也允许在 GitHub 网页上通过按钮手动触发
  workflow_dispatch: 

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    
    # 策略矩阵：这是同时打包双版本的核心！
    # 它会同时启动两个任务：一个用 x64 (64位)，一个用 x86 (32位)
    strategy:
      matrix:
        architecture: ['x64', 'x86']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.architecture }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: ${{ matrix.architecture }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        # 根据架构不同，输出不同名字的 exe 文件
        run: |
          pyinstaller -F -w --name portable_webdav_client_${{ matrix.architecture }} portable_webdav_client.py

      - name: Upload Artifacts
        # 将打包好的 exe 上传到 GitHub 的临时空间
        uses: actions/upload-artifact@v4
        with:
          name: exe-files-${{ matrix.architecture }}
          path: dist/*.exe

  # 发布任务：等打包任务完成后，自动创建 Release
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # 只有打了 Tag 才会自动发布
    
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: exe-files-*
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
