name: Build and Release EXE

# 触发条件：当推送带有 v 开头的标签（如 v1.0.0）时，自动触发打包
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    
    # 策略矩阵：同时打包双版本 (x64 和 x86)
    strategy:
      matrix:
        architecture: ['x64', 'x86']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.architecture }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: ${{ matrix.architecture }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
       
        # --name 后面拼接了 _${{ matrix.architecture }} 来区分 32位和64位
        run: |
          pyinstaller --onefile --noconsole --name "Portable WebDAV Client Pro V1.0_${{ matrix.architecture }}" --icon=webdav.ico portable_webdav_client_Pro.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exe-files-${{ matrix.architecture }}
          path: dist/*.exe

  # 发布任务
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') 
    
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: exe-files-*
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
