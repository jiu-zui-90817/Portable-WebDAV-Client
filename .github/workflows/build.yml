name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动触发按钮

jobs:
  build:
    name: Build on ${{ matrix.platform_name }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows 64位 (主流电脑)
          - os: windows-latest
            platform_name: Windows_X64
            python_arch: 'x64'
            file_ext: .exe
            
          # 2. Windows 32位 (兼容老旧电脑和特殊系统)
          - os: windows-latest
            platform_name: Windows_X86
            python_arch: 'x86'
            file_ext: .exe
            
          # 3. Linux 64位 (常规 x86_64 服务器)
          - os: ubuntu-latest
            platform_name: Linux_X64
            python_arch: 'x64'
            file_ext: ""
            
          # 4. Linux ARM64 (树莓派、甲骨文 ARM 机器等)
          - os: ubuntu-24.04-arm
            platform_name: Linux_ARM64
            file_ext: ""

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🚀 核心魔法：根据矩阵动态安装 32位 或 64位 的 Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.python_arch }} 

    # 🐧 Linux 专属：安装底层 Tkinter 图形库依赖
    - name: Install System Dependencies (Linux Only)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller webdavclient3 requests

    # 🪟 Windows 打包：带 .ico 图标和 .exe 后缀
    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --onefile --noconsole --name "Portable_WebDAV_Client_${{ matrix.platform_name }}" --icon=webdav.ico portable_webdav_client_Pro.py

    # 🐧 Linux 打包：纯净打包，不带图标属性
    - name: Build with PyInstaller (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller --onefile --noconsole --name "Portable_WebDAV_Client_${{ matrix.platform_name }}" portable_webdav_client_Pro.py

    # 📤 统一上传产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Release-${{ matrix.platform_name }}
        path: dist/Portable_WebDAV_Client_${{ matrix.platform_name }}${ matrix.file_ext }
